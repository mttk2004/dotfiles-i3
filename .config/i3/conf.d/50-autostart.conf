# --- CẤU HÌNH TỰ ĐỘNG KHI KHỞI ĐỘNG ---

# 1. Chỉnh độ phân giải sắc nét
exec_always --no-startup-id xrandr --output Virtual-1 --mode 1920x1200

# 2. Nạp cấu hình DPI (Scaling) để không bị nhỏ
exec_always --no-startup-id xrdb -merge ~/.Xresources

# 3. Chạy công cụ hỗ trợ máy ảo (tự động co giãn, copy-paste)
exec_always --no-startup-id spice-vdagent

# 4. Vẽ hình nền (nếu bạn đã cài feh)
exec_always --no-startup-id feh --bg-fill ~/.config/wallpapers/1.jpg

# 5. Bật Compositor để có hiệu ứng trong suốt, bo góc, bóng mờ (Cần cài package 'picom')
exec_always --no-startup-id picom -b

# 6. Khởi động trình quản lý thông báo (Cần cài package 'dunst')
exec --no-startup-id dunst

# 7. Khởi động biểu tượng kết nối mạng (Wifi/Bluetooth) trên thanh tray
exec --no-startup-id nm-applet

# 8. Tự động nạp script khởi động Polybar
exec_always --no-startup-id ~/.config/polybar/launch.sh
