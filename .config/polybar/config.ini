[colors]
base = #1e1e2e
mantle = #181825
crust = #11111b
text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de
surface0 = #313244
surface1 = #45475a
surface2 = #585b70
overlay0 = #6c7086
overlay1 = #7f849c
overlay2 = #9399b2
blue = #89b4fa
lavender = #b4befe
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
maroon = #eba0ac
red = #f38ba8
mauve = #cba6f7
pink = #f5c2e7
flamingo = #f2cdcd
rosewater = #f5e0dc
transparent = #00000000

background = ${colors.base}
background-alt = ${colors.surface0}
foreground = ${colors.text}
primary = ${colors.lavender}
secondary = ${colors.sky}
alert = ${colors.red}
disabled = ${colors.overlay0}

[bar/main]
width = 100%
height = 24pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = ${colors.background}

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

# Font 0: Chữ thường
font-0 = "JetBrainsMono Nerd Font:size=13;2"
# Font 1: Icon
font-1 = "FontAwesome:size=14;3"

modules-left = i3
modules-center = date
modules-right = backlight battery pulseaudio memory cpu wlan systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 8pt

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

label-focused = %index%
label-focused-background = ${colors.surface0}
label-focused-underline= ${colors.primary}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-padding = 1

label-visible = %index%
label-visible-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = " muted"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#f38ba8}󰖪%{F-} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#b4befe}%{F-} %essid%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.text}
format-prefix = "󰥔 "
format-prefix-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
; Bạn có thể chạy `ls -1 /sys/class/power_supply/` trên terminal để xem tên pin là BAT0 hay BAT1
battery = BAT0
adapter = ACAD
poll-interval = 5

format-charging = <label-charging>
format-charging-prefix = "󰂄 "
format-charging-prefix-foreground = ${colors.primary}
label-charging = %percentage%%

format-discharging = <label-discharging>
format-discharging-prefix = "󰁾 "
format-discharging-prefix-foreground = ${colors.primary}
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.primary}
label-full = %percentage%%

[module/backlight]
type = internal/backlight
; Polybar thường sẽ tự nhận diện backlight card, nếu không nhận, bạn chạy lệnh `ls -1 /sys/class/backlight/`
; và bỏ uncomment dòng dưới, điền tên card vào. Ví dụ: card = intel_backlight
; card = intel_backlight
use-actual-brightness = true
format = <label>
format-prefix = "󰃠 "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[settings]
screenchange-reload = true
pseudo-transparency = true
