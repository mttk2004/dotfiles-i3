[colors]
base = #1e1e2e
mantle = #181825
crust = #11111b
text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de
surface0 = #313244
surface1 = #45475a
surface2 = #585b70
overlay0 = #6c7086
overlay1 = #7f849c
overlay2 = #9399b2
blue = #89b4fa
lavender = #b4befe
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
maroon = #eba0ac
red = #f38ba8
mauve = #cba6f7
pink = #f5c2e7
flamingo = #f2cdcd
rosewater = #f5e0dc
transparent = #00000000

background = #e61e1e2e
background-alt = ${colors.surface0}
foreground = ${colors.text}
primary = ${colors.lavender}
secondary = ${colors.sky}
alert = ${colors.red}
disabled = ${colors.overlay0}

[bar/main]
width = 98.8%
height = 28
radius = 6
offset-x = 12
offset-y = 8

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 0
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 2

# Font 0: Chữ thường (Medium)
font-0 = "JetBrainsMono Nerd Font:style=Medium:size=12;3"
# Font 1: Icons to hơn chút
font-1 = "JetBrainsMono Nerd Font:size=16;3"

modules-left = i3
modules-center = date
modules-right = backlight battery pulseaudio memory cpu wlan systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

override-redirect = true
wm-restack = i3

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 8pt

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
index-sort = true
enable-click = true
enable-scroll = false

label-focused = %index%
label-focused-foreground = ${colors.lavender}
label-focused-underline = ${colors.lavender}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.overlay1}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.blue}
label-volume = %percentage%%
label-volume-padding = 1

label-muted = "󰝟 muted"
label-muted-foreground = ${colors.disabled}
label-muted-padding = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.green}
label = %percentage_used:2%%
label-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.mauve}
label = %percentage:2%%
label-padding = 1

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#f38ba8}󰖪%{F-} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
format-connected = <label-connected>
format-connected-prefix = "󰖩 "
format-connected-prefix-foreground = ${colors.lavender}
label-connected = %essid%
label-connected-padding = 1

format-disconnected = <label-disconnected>
label-disconnected = "󰖪 "
label-disconnected-foreground = ${colors.red}

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
format-prefix = "󰥔 "
format-prefix-foreground = ${colors.maroon}
label = %date%
label-foreground = ${colors.text}

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ACAD
poll-interval = 5

format-charging = <label-charging>
format-charging-prefix = "󰂄 "
format-charging-prefix-foreground = ${colors.yellow}
label-charging = %percentage%%
label-charging-padding = 1

format-discharging = <label-discharging>
format-discharging-prefix = "󰁾 "
format-discharging-prefix-foreground = ${colors.peach}
label-discharging = %percentage%%
label-discharging-padding = 1

format-full = <label-full>
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.green}
label-full = %percentage%%
label-full-padding = 1

[module/backlight]
type = internal/backlight
use-actual-brightness = true
format-prefix = "󰃠 "
format-prefix-foreground = ${colors.sky}
label = %percentage%%
label-padding = 1

[settings]
screenchange-reload = true
pseudo-transparency = true
